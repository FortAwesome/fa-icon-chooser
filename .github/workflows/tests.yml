name: Tests

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Deps
        run: |
          cd packages/fa-icon-chooser
          npm install
      - name: Run Tests
        # Spec tests only. The e2e suite (`npm run test`) launches a real browser via
        # Puppeteer, which doesn't reliably resolve on the runner; run e2e in local dev.
        run: |
          cd packages/fa-icon-chooser
          npm run test.ci
      - name: Check Format
        run: |
          cd packages/fa-icon-chooser
          npm run format.check
